<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>АЛГЫС</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{


height:100vh;


background-image:

linear-gradient(
rgba(0,0,0,0.5),
rgba(0,0,0,0.5)
),

url("background.jpg");

background-size:cover;

background-position:center;


font-family:Arial,sans-serif;


display:flex;

justify-content:center;

align-items:center;


}




.container{


width:800px;


padding:40px;


background:rgba(255,255,255,0.15);


border-radius:25px;


backdrop-filter:blur(10px);


color:white;


text-align:center;


}




h1{


font-size:45px;

margin-bottom:40px;


}




.languages{


display:flex;


justify-content:space-around;


gap:30px;


}




.block{


width:300px;


padding:30px;


background:rgba(255,255,255,0.2);


border-radius:20px;


}




h2{


margin-bottom:20px;


}



button{


padding:15px 30px;


border:none;


border-radius:30px;


font-size:18px;


cursor:pointer;


transition:0.3s;


}



button:hover{


transform:scale(1.1);


}



</style>

</head>



<body>



<!-- Звуки -->


<audio id="sound1">

<source src="russian.mp3" type="audio/mpeg">

</audio>



<audio id="sound2">

<source src="english.mp3" type="audio/mpeg">

</audio>





<div class="container">


<h1>
Выбери язык 

</h1>

<h1>
    Тылгын тал
</h1>




<div class="languages">



<div class="block">


<h2>
Русский
</h2>


<p>
Слушать русский вариант
</p>


<br>


<button onclick="playRussian()">

▶ Включить

</button>


</div>





<div class="block">


<h2>
 Сахалы
</h2>


<p>
Саха варианын иһит
</p>


<br>


<button onclick="playEnglish()">

▶ Холбо

</button>


</div>




</div>


</div>





<script>



function playRussian(){


let audio1 = document.getElementById("sound1");


let audio2 = document.getElementById("sound2");



audio2.pause();


audio1.play();


}





function playEnglish(){


let audio1 = document.getElementById("sound1");


let audio2 = document.getElementById("sound2");



audio1.pause();


audio2.play();


}



</script>



</body>

</html>
